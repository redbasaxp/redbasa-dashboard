name: Análisis diario Red Basa

on:
  schedule:
    - cron: '0 7 * * *'   # 4am UTC-3 = 7am UTC
  workflow_dispatch:        # correr manualmente desde Actions

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          RESULTS_SHEET_ID:        ${{ secrets.RESULTS_SHEET_ID }}
          GOOGLE_RATINGS_SHEET_ID: ${{ secrets.GOOGLE_RATINGS_SHEET_ID }}
        run: python scripts/analyze.py

      - name: Test Todoist SSJ
        env:
          TODOIST_SSJ: ${{ secrets.TODOIST_SSJ }}
        run: python scripts/test_todoist.py
